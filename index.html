<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>支持我的创作</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:   #FF4D2E;
      --ink:      #111;
      --muted:    #888;
      --border:   #e8e8e8;
      --bg:       #fff;
      --hover-bg: #fafafa;
    }

    body {
      font-family: 'DM Sans', 'Noto Sans SC', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ── */
    .page {
      max-width: 520px;
      margin: 0 auto;
      padding: 72px 24px 96px;
    }

    /* ── Stagger animation ── */
    .page > * {
      opacity: 0;
      transform: translateY(16px);
      animation: up .5s ease forwards;
    }
    .page > *:nth-child(1) { animation-delay: .00s }
    .page > *:nth-child(2) { animation-delay: .06s }
    .page > *:nth-child(3) { animation-delay: .12s }
    .page > *:nth-child(4) { animation-delay: .18s }
    .page > *:nth-child(5) { animation-delay: .24s }
    .page > *:nth-child(6) { animation-delay: .30s }
    .page > *:nth-child(7) { animation-delay: .36s }

    @keyframes up {
      to { opacity: 1; transform: none; }
    }

    /* ── Header ── */
    .eyebrow {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 20px;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(38px, 9vw, 56px);
      line-height: 1.1;
      letter-spacing: -.02em;
      color: var(--ink);
      margin-bottom: 20px;
    }

    h1 i {
      font-style: italic;
      color: var(--accent);
    }

    .desc {
      font-size: 15px;
      line-height: 1.75;
      color: var(--muted);
      font-weight: 300;
      margin-bottom: 52px;
    }

    /* ── Rule ── */
    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin-bottom: 32px;
    }

    /* ── Section label ── */
    .label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    /* ── QR row ── */
    .qr-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 48px;
    }

    @media (max-width: 440px) {
      .qr-row { grid-template-columns: 1fr; }
    }

    .qr-box {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      transition: border-color .18s, background .18s;
    }

    .qr-box:hover {
      border-color: #ccc;
      background: var(--hover-bg);
    }

    .qr-brand {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 14px;
    }
    .qr-brand.wx  { color: #07C160; }
    .qr-brand.ali { color: #1677FF; }
    .qr-brand svg { width: 15px; height: 15px; }

    .qr-img {
      width: 152px;
      height: 152px;
      margin: 0 auto 12px;
      border-radius: 8px;
      background: #f4f4f4;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .qr-img img {
      width: 100%; height: 100%;
      object-fit: contain;
      display: block;
    }

    .placeholder-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      color: #bbb;
      font-size: 10px;
      letter-spacing: .04em;
      line-height: 1.5;
      text-align: center;
    }
    .placeholder-icon svg { width: 32px; height: 32px; opacity: .5; }
    .placeholder-icon code {
      font-family: monospace;
      font-size: 10px;
      color: #aaa;
      background: #ececec;
      padding: 1px 5px;
      border-radius: 3px;
    }

    .qr-tip {
      font-size: 11px;
      color: var(--muted);
    }

    /* ── Link list ── */
    .link-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-bottom: 56px;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 12px;
      border-radius: 10px;
      text-decoration: none;
      color: var(--ink);
      transition: background .15s;
    }

    .link-item:hover { background: var(--hover-bg); }

    .link-dot {
      width: 36px; height: 36px;
      border-radius: 9px;
      background: #f2f2f2;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }

    .link-info { flex: 1; min-width: 0; }
    .link-name { font-size: 14px; font-weight: 500; line-height: 1; margin-bottom: 3px; }
    .link-href { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .link-chevron { color: #ccc; font-size: 18px; flex-shrink: 0; transition: color .15s, transform .15s; }
    .link-item:hover .link-chevron { color: var(--accent); transform: translateX(2px); }

    /* ── Footer ── */
    footer {
      font-size: 13px;
      color: #bbb;
      line-height: 1.7;
    }

    footer strong {
      color: var(--ink);
      font-weight: 500;
    }

    .heart { color: var(--accent); display: inline-block; animation: beat 1.4s ease infinite; }
    @keyframes beat {
      0%,100% { transform: scale(1) }
      30%      { transform: scale(1.25) }
      60%      { transform: scale(1) }
      80%      { transform: scale(1.15) }
    }

    /* ── Site footer ── */
    .site-footer {
      border-top: 1px solid var(--border);
      margin-top: 64px;
      padding-top: 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .site-footer-links {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .site-footer-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 500;
      color: #999;
      text-decoration: none;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color .15s, background .15s;
    }

    .site-footer-link:hover {
      color: var(--ink);
      background: var(--hover-bg);
    }

    .site-footer-link svg { width: 13px; height: 13px; flex-shrink: 0; }

    .site-footer-sep {
      font-size: 12px;
      color: #ddd;
    }

    .powered {
      font-size: 11px;
      color: #ccc;
      letter-spacing: .02em;
    }

    .powered a {
      color: #aaa;
      text-decoration: none;
      font-weight: 500;
      transition: color .15s;
    }

    .powered a:hover { color: var(--accent); }
  </style>
</head>
<body>
<div class="page">

  <p class="eyebrow">Support my work</p>

  <h1>请我喝杯<br><i>咖啡</i> ☕</h1>

  <p class="desc">
    <!-- 👇 改成你自己的简介 / 感谢语 -->
    我是 <strong style="color:var(--ink);font-weight:500">你的名字</strong>，独立创作者。<br>
    所有内容免费开放——如果对你有帮助，欢迎用任意金额支持我继续做下去。
  </p>

  <hr>
  <p class="label">扫码赞赏</p>

  <div class="qr-row">

    <div class="qr-box">
      <div class="qr-brand wx">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8.691 2.188C3.891 2.188 0 5.476 0 9.53c0 2.212 1.17 4.203 3.002 5.55a.59.59 0 0 1 .213.665l-.39 1.48c-.019.07-.048.141-.048.213 0 .163.13.295.29.295a.326.326 0 0 0 .167-.054l1.903-1.114a.864.864 0 0 1 .717-.098 10.16 10.16 0 0 0 2.837.403c.276 0 .543-.027.811-.05-.857-2.578.157-4.972 1.932-6.446 1.703-1.415 3.882-1.98 5.853-1.838-.576-3.583-3.895-6.348-7.596-6.348zm-2.906 3.8c.642 0 1.162.53 1.162 1.18a1.17 1.17 0 0 1-1.162 1.18A1.17 1.17 0 0 1 4.623 7.17c0-.65.52-1.18 1.162-1.18zm5.813 0c.642 0 1.162.53 1.162 1.18a1.17 1.17 0 0 1-1.162 1.18 1.17 1.17 0 0 1-1.162-1.18c0-.65.52-1.18 1.162-1.18zm2.34 4.879c-1.797-.052-3.746.512-5.28 1.786-1.72 1.428-2.687 3.72-1.78 6.22.942 2.453 3.666 4.229 6.884 4.229.826 0 1.622-.12 2.361-.336a.722.722 0 0 1 .598.082l1.584.926a.272.272 0 0 0 .14.047c.134 0 .24-.111.24-.247 0-.06-.023-.12-.038-.177l-.327-1.233a.49.49 0 0 1 .178-.554C23.024 18.48 24 16.82 24 14.98c0-3.21-2.931-5.837-7.062-6.122zm-3.934 2.555c.529 0 .958.436.958.972a.966.966 0 0 1-.958.973.966.966 0 0 1-.958-.973c0-.536.43-.972.958-.972zm4.947 0c.529 0 .958.436.958.972a.966.966 0 0 1-.958.973.966.966 0 0 1-.958-.973c0-.536.43-.972.958-.972z"/></svg>
        微信支付
      </div>
      <div class="qr-img" id="wx-frame">
        <!--
          把微信收款码图片命名为 wechat-qr.png 放入项目根目录即可自动显示
          <img src="wechat-qr.png" alt="微信收款码" />
        -->
        <div class="placeholder-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h2v2h-2zM18 14h2v2h-2zM14 18h2v2h-2zM18 18h2v2h-2z"/></svg>
          <code>wechat-qr.png</code>
        </div>
      </div>
      <p class="qr-tip">微信扫一扫</p>
    </div>

    <div class="qr-box">
      <div class="qr-brand ali">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.422 15.358c-3.83-1.153-6.055-1.84-7.766-2.358.802-1.422 1.328-3.042 1.526-4.817H18V6.817h-4.002V5h-2.443v1.817H7.578V8.183h6.607c-.175 1.367-.56 2.61-1.11 3.658-1.4-.38-2.96-.722-4.612-.837C5.196 10.745 2 12.44 2 15.65 2 18.055 4.02 20 6.52 20c2.73 0 5.428-1.77 7.306-4.728 2.155.837 4.552 1.86 6.884 3.03L22 17.24a35.028 35.028 0 0 0-.578-.882zM6.52 18.124C4.98 18.124 4 17.074 4 15.65c0-1.768 1.593-2.9 3.558-2.69 1.418.155 2.75.526 3.988.96C9.98 16.8 8.22 18.124 6.52 18.124z"/></svg>
        支付宝
      </div>
      <div class="qr-img" id="ali-frame">
        <!--
          把支付宝收款码图片命名为 alipay-qr.png 放入项目根目录即可自动显示
          <img src="alipay-qr.png" alt="支付宝收款码" />
        -->
        <div class="placeholder-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h2v2h-2zM18 14h2v2h-2zM14 18h2v2h-2zM18 18h2v2h-2z"/></svg>
          <code>alipay-qr.png</code>
        </div>
      </div>
      <p class="qr-tip">支付宝扫一扫</p>
    </div>

  </div>

  <hr>
  <p class="label">更多渠道</p>

  <div class="link-list">

    <!-- 👇 将 YOUR_USERNAME 替换为你的爱发电用户名 -->
    <a class="link-item" href="https://afdian.com/a/YOUR_USERNAME" target="_blank" rel="noopener">
      <div class="link-dot">⚡</div>
      <div class="link-info">
        <div class="link-name">爱发电</div>
        <div class="link-href">afdian.com/a/YOUR_USERNAME</div>
      </div>
      <span class="link-chevron">›</span>
    </a>

    <!-- Ko-fi（可选，取消注释启用）
    <a class="link-item" href="https://ko-fi.com/YOUR_USERNAME" target="_blank" rel="noopener">
      <div class="link-dot">☕</div>
      <div class="link-info">
        <div class="link-name">Ko-fi</div>
        <div class="link-href">ko-fi.com/YOUR_USERNAME</div>
      </div>
      <span class="link-chevron">›</span>
    </a>
    -->

    <!-- GitHub Sponsors（可选，取消注释启用）
    <a class="link-item" href="https://github.com/sponsors/YOUR_USERNAME" target="_blank" rel="noopener">
      <div class="link-dot">🐙</div>
      <div class="link-info">
        <div class="link-name">GitHub Sponsors</div>
        <div class="link-href">github.com/sponsors/YOUR_USERNAME</div>
      </div>
      <span class="link-chevron">›</span>
    </a>
    -->

  </div>

  <footer>
    感谢每一份支持 <span class="heart">♥</span><br>
    <!-- 👇 改成你的名字 -->
    — <strong>你的名字</strong>
  </footer>

  <!-- ── Site footer ── -->
  <div class="site-footer">
    <div class="site-footer-links">

      <!-- 👇 href 改成你的个人主页，文字改成你的名字 -->
      <a class="site-footer-link" href="https://your-website.com" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
        </svg>
        你的名字
      </a>

      <span class="site-footer-sep">·</span>

      <!-- 👇 href 改成你的 GitHub 仓库链接 -->
      <a class="site-footer-link" href="https://github.com/YOUR_USERNAME/donation-page" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.02 10.02 0 0 0 22 12.017C22 6.484 17.522 2 12 2z"/>
        </svg>
        GitHub
      </a>

    </div>

    <p class="powered">
      Powered by <a href="https://claude.ai" target="_blank" rel="noopener">Claude</a>
    </p>
  </div>

</div>

<script>
  function tryLoad(src, frameId) {
    const img = new Image();
    img.onload = () => {
      const f = document.getElementById(frameId);
      f.innerHTML = '';
      img.style.cssText = 'width:100%;height:100%;object-fit:contain';
      f.appendChild(img);
    };
    img.src = src;
  }
  tryLoad('wechat-qr.png', 'wx-frame');
  tryLoad('alipay-qr.png', 'ali-frame');
</script>
</body>
</html>
